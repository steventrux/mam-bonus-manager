name: Test Bash script

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: |
          bash -n mam-bonus-manager.sh
          bash -n lib/donations.sh
          bash -n scripts/donation-planner.sh
          bash -n docker-entrypoint.sh

      - name: Node syntax check
        run: node --check scripts/mam-browser-gift.js

      - name: ShellCheck
        run: shellcheck mam-bonus-manager.sh

      - name: Docker build test
        run: docker build -t mam-bonus-manager:test .

      - name: Docker version test
        run: docker run --rm mam-bonus-manager:test --version

      - name: Docker help test
        run: |
          mkdir -p test-config test-data
          cp config/config.env.example test-config/config.env
          docker run --rm \
            -e MAM_WORKDIR=/data \
            -v "$PWD/test-config:/config" \
            -v "$PWD/test-data:/data" \
            mam-bonus-manager:test help
